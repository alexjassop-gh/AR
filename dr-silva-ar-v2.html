<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dr. Alejandro Silva</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', Arial, sans-serif;
  background: #000;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── CÁMARA DE FONDO ── */
#camBg {
  position: fixed;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* ── ÁREA DE VIDEO (60% superior) ── */
.video-area {
  position: relative;
  flex: 0 0 62vh;
  width: 100%;
  z-index: 1;
  display: flex;
  align-items: flex-end;     /* videos pegados abajo */
  justify-content: center;
}

.video-area video {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 90%;
  max-width: 360px;
  mix-blend-mode: screen;
  transition: opacity 0.3s;
}

#vid-holo   { z-index: 2; opacity: 1; }
#vid-unfold { z-index: 3; opacity: 0; pointer-events: none; }

.tap-hint {
  position: absolute;
  bottom: 12px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  color: rgba(255,255,255,0.8);
  font-size: 11px;
  padding: 5px 16px;
  border-radius: 20px;
  z-index: 10;
  white-space: nowrap;
  transition: opacity 0.5s;
}
.tap-hint.hidden { opacity: 0; pointer-events: none; }

/* ── FRAME INFERIOR ── */
.bottom-frame {
  position: relative;
  z-index: 2;
  flex: 1;
  background: linear-gradient(180deg, rgba(10,20,50,0.92) 0%, rgba(8,16,40,0.97) 100%);
  backdrop-filter: blur(8px);
  border-top: 1px solid rgba(0,180,255,0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 16px 14px;
  gap: 8px;
}

/* fila principal: Contacto | Countdown | Ubicacion */
.main-row {
  display: flex;
  width: 100%;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.btn-side {
  flex: 0 0 auto;
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 12px; font-weight: 700;
  text-decoration: none;
  color: #fff;
  background: linear-gradient(135deg, #1a5cb0, #0d3d7a);
  box-shadow: 0 3px 10px rgba(0,80,180,0.4);
  white-space: nowrap;
  transition: transform 0.15s;
}
.btn-side:active { transform: scale(0.95); }

/* countdown central */
.countdown-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.cd-label {
  color: #6090d0; font-size: 9px;
  font-weight: 600; letter-spacing: 1px;
  text-transform: uppercase;
}
.cd-time {
  font-size: 22px; font-weight: 800;
  color: #fff; letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.cd-time.urgent { color: #ff4444; animation: pulse 0.8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.cd-sub {
  font-size: 9px; color: #4060a0;
  text-align: center;
}
.cd-sub.urgent-msg { color: #ff6644; font-weight: 600; }

/* botón Agendar Cita */
.btn-cita {
  display: block;
  width: 100%;
  max-width: 240px;
  padding: 10px;
  border-radius: 24px;
  font-size: 13px; font-weight: 800;
  text-align: center; text-decoration: none;
  color: #fff;
  background: linear-gradient(135deg, #0d2e6e, #091d4a);
  box-shadow: 0 4px 16px rgba(0,30,100,0.5),
              0 0 0 1px rgba(0,150,255,0.2);
  letter-spacing: 0.5px;
  transition: transform 0.15s;
}
.btn-cita:active { transform: scale(0.97); }

/* info panel */
.info-panel {
  width: 100%;
  max-height: 0; overflow: hidden;
  transition: max-height 0.35s ease;
  text-align: center;
}
.info-panel.open { max-height: 60px; }
.info-content {
  font-size: 12px; color: #80aae0;
  padding: 4px 0;
  line-height: 1.6;
}
.info-content a { color: #4da6ff; text-decoration: none; font-weight: 600; }

.expired-msg {
  display: none;
  color: #ff4444; font-size: 12px; font-weight: 700;
  text-align: center;
}
</style>
</head>
<body>

<!-- CÁMARA DE FONDO -->
<video id="camBg" autoplay playsinline muted></video>

<!-- ÁREA DE VIDEO CON HOLOGRAMAS -->
<div class="video-area" id="videoArea">
  <video id="vid-holo"
    src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/1%20label%20girando.mp4"
    autoplay loop muted playsinline preload="auto">
  </video>
  <video id="vid-unfold"
    src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/2%20label%20unfolds%20fondo%20negro.mp4"
    muted playsinline preload="auto">
  </video>
  <div class="tap-hint" id="tapHint">Toca para ver la etiqueta ✦</div>
</div>

<!-- FRAME INFERIOR -->
<div class="bottom-frame">

  <div class="main-row">
    <a class="btn-side" href="https://wa.me/528712345528?text=Hola%20Dr.%20Silva,%20vi%20su%20promoción" onclick="showInfo('contacto');return true;">Contacto</a>

    <div class="countdown-center">
      <div class="cd-label">⏰ Oferta termina en</div>
      <div class="cd-time" id="cdTime">02:00:00</div>
      <div class="cd-sub" id="cdSub">¡Agenda antes de que expire!</div>
    </div>

    <a class="btn-side" href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank" onclick="showInfo('ubicacion');return true;">Ubicación</a>
  </div>

  <a class="btn-cita" href="https://calendly.com" target="_blank">Agendar Cita</a>

  <div class="info-panel" id="infoPanel">
    <div class="info-content" id="infoContent"></div>
  </div>

  <div class="expired-msg" id="expiredMsg">⚠️ Esta oferta ha expirado</div>

</div>

<script>
// ── CÁMARA ──
navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
  .then(stream => { document.getElementById('camBg').srcObject = stream; })
  .catch(() => { document.getElementById('camBg').style.display = 'none'; });

// ── VIDEO LOGIC ──
const vidHolo   = document.getElementById('vid-holo');
const vidUnfold = document.getElementById('vid-unfold');
const tapHint   = document.getElementById('tapHint');
const videoArea = document.getElementById('videoArea');
let unfolded = false;

videoArea.addEventListener('click', () => {
  if (unfolded) return;
  unfolded = true;
  tapHint.classList.add('hidden');

  // parar holograma, mostrar unfold
  vidHolo.pause();
  vidHolo.style.opacity = '0';
  vidUnfold.style.opacity = '1';
  vidUnfold.currentTime = 0;
  vidUnfold.play();

  // al terminar unfold, quedarse en último frame
  vidUnfold.addEventListener('ended', () => {
    // congelar en último frame — no hacer nada
  }, { once: true });
});

// ── COUNTDOWN ──
const endTime = Date.now() + 2 * 60 * 60 * 1000;

function pad(n) { return String(n).padStart(2,'0'); }

function updateTimer() {
  const rem = endTime - Date.now();
  const cdTime = document.getElementById('cdTime');
  const cdSub  = document.getElementById('cdSub');

  if (rem <= 0) {
    cdTime.textContent = '00:00:00';
    document.getElementById('expiredMsg').style.display = 'block';
    cdSub.style.display = 'none';
    return;
  }

  const h = Math.floor(rem / 3600000);
  const m = Math.floor((rem % 3600000) / 60000);
  const s = Math.floor((rem % 60000) / 1000);
  cdTime.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;

  const urgent = rem < 600000;
  cdTime.classList.toggle('urgent', urgent);
  if (urgent) {
    cdSub.textContent = '🔴 ¡Menos de 10 min! Agenda ya';
    cdSub.classList.add('urgent-msg');
  }

  setTimeout(updateTimer, 1000);
}
updateTimer();

// ── INFO PANELS ──
let currentPanel = null;
function showInfo(type) {
  const panel   = document.getElementById('infoPanel');
  const content = document.getElementById('infoContent');
  const infos = {
    contacto: '📱 <a href="https://wa.me/528712345528">+52 871 234 5528</a> · WhatsApp directo',
    ubicacion: '📍 Torreón, Coah. · <a href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank">Abrir Maps</a>'
  };
  if (currentPanel === type) {
    panel.classList.remove('open');
    currentPanel = null;
    return;
  }
  content.innerHTML = infos[type] || '';
  panel.classList.add('open');
  currentPanel = type;
}
</script>
</body>
</html>
