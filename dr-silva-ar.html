<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dr. Alejandro Silva - Consulta Gratis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', Arial, sans-serif;
  background: #0a0f1e;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow-x: hidden;
}

/* ── VIDEO SECTION ── */
.video-section {
  position: relative;
  width: 100%;
  max-width: 480px;
  background: #000;
  aspect-ratio: 16/9;
  overflow: hidden;
}

.video-section video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  mix-blend-mode: screen;
}

/* holograma siempre visible en loop */
#vid-holo {
  z-index: 1;
  mix-blend-mode: screen;
}
/* unfold encima, oculto al inicio */
#vid-unfold {
  z-index: 2;
  mix-blend-mode: screen;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
#vid-unfold.playing {
  opacity: 1;
}

/* tap para activar */
.tap-hint {
  position: absolute;
  bottom: 10px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  color: rgba(255,255,255,0.7);
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 20px;
  z-index: 10;
  pointer-events: none;
  transition: opacity 0.5s;
}
.tap-hint.hidden { opacity: 0; }

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(160deg, #e8f4ff 0%, #c8e4f8 40%, #a8d4f0 100%);
  box-shadow: 0 -4px 20px rgba(0,100,255,0.15);
}

/* ── ETIQUETA ── */
.label-body {
  padding: 14px 12px 10px;
  display: grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap: 8px;
  align-items: center;
}

.col-doctor {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.doctor-photo {
  width: 72px; height: 72px;
  border-radius: 50%;
  border: 3px solid #1a6abf;
  background: linear-gradient(135deg, #1a6abf, #0d3d7a);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.5), 0 4px 12px rgba(0,80,180,0.3);
  overflow: hidden;
}
.doctor-photo .initials { font-size:20px; font-weight:800; color:#fff; }
.doctor-name { font-size:10px; font-weight:700; color:#0d2e6e; text-align:center; line-height:1.3; }
.doctor-spec { font-size:9px; color:#4070a0; text-align:center; }

.col-promo {
  display: flex; flex-direction: column;
  align-items: center; gap: 3px;
}
.promo-label { font-size:10px; font-weight:600; color:#1a4fa0; }
.promo-desc  { font-size:12px; font-weight:700; color:#0d2e6e; text-align:center; line-height:1.3; }
.promo-gratis {
  font-size:24px; font-weight:800; color:#0d2e6e;
  letter-spacing:3px; line-height:1;
}
.promo-restricc { font-size:8px; color:#6090b0; }

.col-mapa {
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.map-circle {
  width:72px; height:72px; border-radius:50%;
  border:3px solid #1a6abf;
  background:#d0e8f8;
  display:flex; align-items:center; justify-content:center;
  box-shadow: 0 0 0 2px rgba(255,255,255,0.5), 0 4px 12px rgba(0,80,180,0.3);
  font-size:26px;
}

/* ── BOTONES ── */
.btn-row {
  display: grid;
  grid-template-columns: 1fr 1.3fr 1fr;
  gap: 8px;
  padding: 0 12px 10px;
}
.btn {
  padding: 8px 4px;
  border-radius: 20px;
  font-size: 11px; font-weight: 700;
  text-align: center; text-decoration: none;
  cursor: pointer; border: none;
  display: block;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:active { transform: scale(0.95); }
.btn-contacto, .btn-ubicacion {
  background: linear-gradient(135deg, #1a5cb0, #0d3d7a);
  color: #fff;
  box-shadow: 0 3px 10px rgba(0,80,180,0.3);
}
.btn-cita {
  background: linear-gradient(135deg, #0d2e6e, #091d4a);
  color: #fff;
  box-shadow: 0 3px 14px rgba(0,30,100,0.4);
  font-size: 12px;
}

/* ── COUNTDOWN ── */
.countdown-section {
  background: linear-gradient(90deg, #0d2e6e, #1a4fa0);
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  width: 100%; max-width: 480px;
}
.countdown-label {
  color: #a0c8ff; font-size: 11px;
  font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase;
}
.countdown-timer {
  display: flex; gap: 6px; align-items: center;
}
.time-block {
  display: flex; flex-direction: column; align-items: center;
}
.time-num {
  font-size: 32px; font-weight: 800; color: #fff;
  line-height: 1; font-variant-numeric: tabular-nums;
  min-width: 44px; text-align: center;
}
.time-num.urgent { color: #ff5555; animation: urgentPulse 0.8s infinite; }
@keyframes urgentPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.time-sep { font-size:28px; font-weight:800; color:#6090d0; margin-bottom:4px; }
.time-sub { font-size:9px; color:#6090d0; letter-spacing:0.5px; text-transform:uppercase; }

.urgency-msg {
  color: #ffcc44; font-size: 12px; font-weight: 700;
  text-align: center; letter-spacing: 0.3px;
  animation: fadeInOut 2s infinite;
}
@keyframes fadeInOut { 0%,100%{opacity:0.6} 50%{opacity:1} }

/* ── INFO PANEL ── */
.info-panel {
  max-height: 0; overflow: hidden;
  transition: max-height 0.4s ease;
  background: rgba(255,255,255,0.6);
  border-top: 1px solid rgba(26,95,176,0.15);
  width: 100%; max-width: 480px;
}
.info-panel.open { max-height: 120px; }
.info-content {
  padding: 12px 16px;
  font-size: 13px; color: #0d2e6e; line-height: 1.6;
}
.info-content a { color: #1a5cb0; text-decoration: none; font-weight: 600; }
.info-title { font-weight:700; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:#6090b0; margin-bottom:5px; }

.expired-bar {
  display: none; text-align: center;
  padding: 10px; background: #cc2200; color: #fff;
  font-weight: 700; font-size: 13px;
  width: 100%; max-width: 480px;
}
</style>
</head>
<body>

<!-- VIDEO -->
<div class="video-section" id="videoSection">
  <video id="vid-holo"
    src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/1%20label%20girando.mp4"
    autoplay loop muted playsinline>
  </video>
  <video id="vid-unfold"
    src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/2%20label%20unfolds%20fondo%20negro.mp4"
    muted playsinline preload="auto">
  </video>
  <div class="tap-hint" id="tapHint">Toca para ver la etiqueta</div>
</div>

<!-- ETIQUETA -->
<div class="card">
  <div class="label-body">
    <div class="col-doctor">
      <div class="doctor-photo"><span class="initials">AS</span></div>
      <div class="doctor-name">Dr. Alejandro Silva</div>
      <div class="doctor-spec">Neuropediatra</div>
    </div>
    <div class="col-promo">
      <div class="promo-label">Promoción:</div>
      <div class="promo-desc">Consulta de<br>Diagnóstico</div>
      <div class="promo-gratis">GRATIS</div>
      <div class="promo-restricc">*Consulta restricciones</div>
    </div>
    <div class="col-mapa">
      <div class="map-circle">📍</div>
      <div class="doctor-spec">Torreón, Coah.</div>
    </div>
  </div>

  <div class="btn-row">
    <a class="btn btn-contacto" href="https://wa.me/528712345528?text=Hola%20Dr.%20Silva,%20vi%20su%20promoción%20de%20consulta%20gratis" onclick="showInfo('contacto');return true;">Contacto</a>
    <a class="btn btn-cita" href="https://calendly.com" target="_blank">Agendar Cita</a>
    <a class="btn btn-ubicacion" href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank" onclick="showInfo('ubicacion');return true;">Ubicación</a>
  </div>
</div>

<!-- INFO PANEL -->
<div class="info-panel" id="infoPanel">
  <div class="info-content" id="infoContent"></div>
</div>

<!-- COUNTDOWN -->
<div class="countdown-section">
  <div class="countdown-label">⏰ Oferta termina en</div>
  <div class="countdown-timer">
    <div class="time-block">
      <span class="time-num" id="th">02</span>
      <span class="time-sub">hrs</span>
    </div>
    <span class="time-sep">:</span>
    <div class="time-block">
      <span class="time-num" id="tm">00</span>
      <span class="time-sub">min</span>
    </div>
    <span class="time-sep">:</span>
    <div class="time-block">
      <span class="time-num" id="ts">00</span>
      <span class="time-sub">seg</span>
    </div>
  </div>
  <div class="urgency-msg" id="urgencyMsg">¡Agenda tu cita antes de que expire la oferta!</div>
</div>

<div class="expired-bar" id="expiredBar">⚠️ Esta oferta ha expirado</div>

<script>
// ── VIDEO LOGIC ──
const vidHolo   = document.getElementById('vid-holo');
const vidUnfold = document.getElementById('vid-unfold');
const tapHint   = document.getElementById('tapHint');
const section   = document.getElementById('videoSection');

let unfolded = false;

section.addEventListener('click', () => {
  if (unfolded) return;
  unfolded = true;
  tapHint.classList.add('hidden');

  // mostrar unfold encima
  vidUnfold.classList.add('playing');
  vidUnfold.currentTime = 0;
  vidUnfold.play();

  // cuando termina unfold, parar holograma
  vidUnfold.addEventListener('ended', () => {
    vidHolo.pause();
    // dejar unfold en último frame
  }, { once: true });
});

// ── COUNTDOWN ──
const endTime = Date.now() + 2 * 60 * 60 * 1000;

function updateTimer() {
  const remaining = endTime - Date.now();
  if (remaining <= 0) {
    ['th','tm','ts'].forEach(id => document.getElementById(id).textContent = '00');
    document.getElementById('expiredBar').style.display = 'block';
    document.getElementById('urgencyMsg').style.display = 'none';
    return;
  }
  const h = Math.floor(remaining / 3600000);
  const m = Math.floor((remaining % 3600000) / 60000);
  const s = Math.floor((remaining % 60000) / 1000);

  const th = document.getElementById('th');
  const tm = document.getElementById('tm');
  const ts = document.getElementById('ts');

  th.textContent = String(h).padStart(2,'0');
  tm.textContent = String(m).padStart(2,'0');
  ts.textContent = String(s).padStart(2,'0');

  const urgent = remaining < 600000;
  [th,tm,ts].forEach(el => el.classList.toggle('urgent', urgent));
  if (urgent) document.getElementById('urgencyMsg').textContent = '🔴 ¡Menos de 10 minutos! Agenda ahora';

  setTimeout(updateTimer, 1000);
}
updateTimer();

// ── INFO PANELS ──
let currentPanel = null;
function showInfo(type) {
  const panel   = document.getElementById('infoPanel');
  const content = document.getElementById('infoContent');
  const infos = {
    contacto: `<div class="info-title">WhatsApp directo</div>📱 <a href="https://wa.me/528712345528">+52 871 234 5528</a><br>Respuesta en horario de consulta`,
    ubicacion: `<div class="info-title">Ubicación</div>📍 Torreón, Coahuila<br><a href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank">Abrir en Google Maps →</a>`
  };
  if (currentPanel === type) {
    panel.classList.remove('open');
    currentPanel = null;
    return;
  }
  content.innerHTML = infos[type] || '';
  panel.classList.add('open');
  currentPanel = type;
}
</script>
</body>
</html>
