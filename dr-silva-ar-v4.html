<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dr. Alejandro Silva</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#000; font-family:'Inter',Arial,sans-serif; }

/* ── CÁMARA FIJA DE FONDO ── */
#camBg {
  position: fixed; inset: 0;
  width:100%; height:100%;
  object-fit: cover;
  z-index: 0;
}

/* ── VIDEOS HOLOGRÁFICOS: mismo z-index layer que cámara, blend funciona ── */
#vid-holo, #vid-unfold {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 400px;
  z-index: 1;
  mix-blend-mode: screen;
  transition: opacity 0.4s;
}
/* posición vertical: parte baja del área de cámara */
#vid-holo   { bottom: 36vh; opacity: 1; }
#vid-unfold { bottom: 36vh; opacity: 0; pointer-events: none; }

/* ── PANEL INFERIOR ── */
.panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 34vh;
  background: linear-gradient(180deg, rgba(6,12,32,0.95) 0%, rgba(4,8,22,0.98) 100%);
  backdrop-filter: blur(12px);
  border-top: 1px solid rgba(0,140,255,0.25);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 20px 14px;
}

/* fila de 3 iconos */
.icon-row {
  display: flex;
  width: 100%;
  justify-content: space-around;
  align-items: flex-start;
}

.icon-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  cursor: pointer;
}

.icon-circle {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  transition: transform 0.15s;
}
.icon-btn:active .icon-circle { transform: scale(0.9); }

.ic-phone { background: linear-gradient(135deg, #1a7a3a, #0d4a22); }
.ic-cal   { background: linear-gradient(135deg, #0d2e6e, #091d4a); }
.ic-map   { background: linear-gradient(135deg, #8b1a1a, #5a0d0d); }

.icon-label {
  font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,0.65);
  letter-spacing: 0.3px;
  text-align: center;
}

/* divisor */
.divider {
  width: 90%; height: 1px;
  background: rgba(255,255,255,0.08);
}

/* countdown */
.countdown {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.cd-label {
  font-size: 9px; font-weight: 600;
  color: #4a6a9a; letter-spacing: 1.5px;
  text-transform: uppercase;
}
.cd-time {
  font-size: 26px; font-weight: 800;
  color: #fff; letter-spacing: 3px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
}
.cd-time.urgent { color: #ff3333; animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.cd-sub {
  font-size: 10px; color: #3a5a8a;
  text-align: center;
}
.cd-sub.hot { color: #ff6633; font-weight: 700; }
</style>
</head>
<body>

<!-- CÁMARA -->
<video id="camBg" autoplay playsinline muted></video>

<!-- VIDEOS (fixed, encima de cámara, blend mode activo) -->
<video id="vid-holo"
  src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/1%20label%20girando.mp4"
  autoplay loop muted playsinline preload="auto">
</video>
<video id="vid-unfold"
  src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/2%20label%20unfolds%20fondo%20negro.mp4"
  muted playsinline preload="auto">
</video>

<!-- PANEL INFERIOR -->
<div class="panel">

  <div class="icon-row">
    <a class="icon-btn" href="https://wa.me/528712345528?text=Hola%20Dr.%20Silva,%20vi%20su%20promoción%20de%20consulta%20gratis">
      <div class="icon-circle ic-phone">📞</div>
      <span class="icon-label">Contacto</span>
    </a>

    <a class="icon-btn" href="https://calendly.com" target="_blank">
      <div class="icon-circle ic-cal">📅</div>
      <span class="icon-label">Agendar Cita</span>
    </a>

    <a class="icon-btn" href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank">
      <div class="icon-circle ic-map">📍</div>
      <span class="icon-label">Ubicación</span>
    </a>
  </div>

  <div class="divider"></div>

  <div class="countdown">
    <div class="cd-label">⏰ Oferta termina en</div>
    <div class="cd-time" id="cdTime">02:00:00</div>
    <div class="cd-sub" id="cdSub">¡Agenda tu cita antes de que expire!</div>
  </div>

</div>

<script>
// ── CÁMARA ──
navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false })
  .then(s => { document.getElementById('camBg').srcObject = s; })
  .catch(() => {});

// ── TRANSICIÓN AUTO DESPUÉS DE 1 VUELTA (~6s) ──
const vh = document.getElementById('vid-holo');
const vu = document.getElementById('vid-unfold');
let done = false;

function transition() {
  if (done) return; done = true;
  vh.style.opacity = '0';
  setTimeout(() => {
    vh.pause();
    vu.style.opacity = '1';
    vu.currentTime = 0;
    vu.play();
  }, 400);
}

vh.addEventListener('canplay', () => setTimeout(transition, 6000), { once:true });
setTimeout(transition, 7500); // fallback

// ── COUNTDOWN 2 HORAS ──
const end = Date.now() + 2*60*60*1000;
const pad = n => String(n).padStart(2,'0');

function tick() {
  const r = end - Date.now();
  const el = document.getElementById('cdTime');
  const sub = document.getElementById('cdSub');
  if (r <= 0) { el.textContent='00:00:00'; sub.style.display='none'; return; }
  const h = Math.floor(r/3600000);
  const m = Math.floor((r%3600000)/60000);
  const s = Math.floor((r%60000)/1000);
  el.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  const urgent = r < 600000;
  el.classList.toggle('urgent', urgent);
  if (urgent) { sub.textContent='🔴 ¡Menos de 10 min! Agenda ya'; sub.classList.add('hot'); }
  setTimeout(tick, 1000);
}
tick();
</script>
</body>
</html>
