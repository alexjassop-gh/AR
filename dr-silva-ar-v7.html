<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dr. Alejandro Silva</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#000; font-family:'Inter',Arial,sans-serif; }

/* cámara de fondo */
#camBg {
  position: fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:0;
}

/* oscurecedor detrás del holograma */
.video-dimmer {
  position: fixed;
  left:50%; transform:translateX(-50%);
  width:92%; max-width:400px;
  z-index:1;
  background: rgba(0,0,0,0.55);
  border-radius: 12px;
}

/* videos encima con screen blend */
#vid-holo, #vid-unfold {
  position: fixed;
  left:50%; transform:translateX(-50%);
  width:92%; max-width:400px;
  z-index:2;
  mix-blend-mode: screen;
  transition: opacity 0.4s;
}
#vid-holo   { opacity:1; }
#vid-unfold { opacity:0; pointer-events:none; }

/* iconos */
.icon-row {
  position: fixed;
  left:0; right:0;
  display:flex;
  justify-content:space-around;
  padding:0 50px;
  z-index:5;
}
.icon-btn {
  display:flex; flex-direction:column;
  align-items:center; text-decoration:none; cursor:pointer;
}
.icon-circle {
  width:48px; height:48px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  background:rgba(0,0,0,0.4);
  border:1.5px solid rgba(255,255,255,0.45);
  backdrop-filter:blur(4px);
  transition:transform 0.15s;
}
.icon-btn:active .icon-circle { transform:scale(0.9); }

/* countdown ring — compacto, esquina inferior derecha */
.cd-wrap {
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 10;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.ring-wrap {
  position:relative; width:80px; height:80px;
  display:flex; align-items:center; justify-content:center;
}
.ring-wrap svg {
  position:absolute; inset:0;
  transform:rotate(-90deg);
}
.ring-bg      { fill:none; stroke:rgba(255,255,255,0.15); stroke-width:4; }
.ring-progress{ fill:none; stroke:#00cfff; stroke-width:4; stroke-linecap:round; transition:stroke-dashoffset 1s linear; }
.ring-inner   { z-index:1; text-align:center; line-height:1.2; }
.ring-time {
  font-size:12px; font-weight:800; color:#fff;
  font-variant-numeric:tabular-nums;
  text-shadow: 0 0 6px #000, 0 1px 3px #000;
  -webkit-text-stroke:0.5px rgba(0,0,0,0.8);
}
.ring-time.urgent { color:#ff3333; animation:blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.ring-label {
  font-size:7px; font-weight:700; color:rgba(255,255,255,0.65);
  letter-spacing:1px; text-transform:uppercase;
  text-shadow:0 1px 3px #000;
}
.cd-sub {
  font-size:10px; color:#fff; font-weight:600; text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,0.9);
  max-width:120px; line-height:1.3;
}
.cd-sub.hot { color:#ff8844; }
</style>
</head>
<body>

<video id="camBg" autoplay playsinline muted></video>

<!-- dimmer detrás del holograma -->
<div class="video-dimmer" id="dimmer"></div>

<video id="vid-holo"
  src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/1%20label%20girando.mp4"
  autoplay loop muted playsinline preload="auto">
</video>
<video id="vid-unfold"
  src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/2%20label%20unfolds%20fondo%20negro.mp4"
  muted playsinline preload="auto">
</video>

<div class="icon-row" id="iconRow">
  <a class="icon-btn" href="https://wa.me/528712345528?text=Hola%20Dr.%20Silva,%20vi%20su%20promoción%20de%20consulta%20gratis">
    <div class="icon-circle">📞</div>
  </a>
  <a class="icon-btn" href="https://calendly.com" target="_blank">
    <div class="icon-circle">📅</div>
  </a>
  <a class="icon-btn" href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank">
    <div class="icon-circle">📍</div>
  </a>
</div>

<div class="cd-wrap">
  <div class="ring-wrap">
    <svg viewBox="0 0 80 80" width="80" height="80">
      <circle class="ring-bg" cx="40" cy="40" r="34"/>
      <circle class="ring-progress" id="ringProgress" cx="40" cy="40" r="34"
        stroke-dasharray="213.6" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-time" id="ringTime">02:00:00</div>
      <div class="ring-label">⏰ oferta</div>
    </div>
  </div>
  <div class="cd-sub" id="cdSub">¡Agenda antes<br>de que expire!</div>
</div>

<script>
// ── CÁMARA ──
navigator.mediaDevices.getUserMedia({ video:{facingMode:'environment'}, audio:false })
  .then(s => document.getElementById('camBg').srcObject = s)
  .catch(() => {});

// ── LAYOUT dinámico ──
function layout() {
  const vw  = window.innerWidth;
  const cw  = Math.min(vw * 0.92, 400);
  const ch  = cw * (9/16);
  const bot = Math.round(window.innerHeight * 0.22); // 22% desde abajo

  ['vid-holo','vid-unfold'].forEach(id => {
    const v = document.getElementById(id);
    v.style.bottom = bot + 'px';
  });

  const dimmer = document.getElementById('dimmer');
  dimmer.style.bottom  = bot + 'px';
  dimmer.style.height  = ch + 'px';

  // iconos justo debajo del video
  document.getElementById('iconRow').style.bottom = (bot - 56) + 'px';
}
layout();
window.addEventListener('resize', layout);

// ── TRANSICIÓN AUTO 6s ──
const vh = document.getElementById('vid-holo');
const vu = document.getElementById('vid-unfold');
let done = false;
function transition() {
  if (done) return; done = true;
  vh.style.opacity = '0';
  setTimeout(() => { vh.pause(); vu.style.opacity='1'; vu.currentTime=0; vu.play(); }, 400);
}
vh.addEventListener('canplay', () => setTimeout(transition, 6000), {once:true});
setTimeout(transition, 7500);

// ── COUNTDOWN ──
const TOTAL = 2*60*60*1000;
const end   = Date.now() + TOTAL;
const CIRC  = 2*Math.PI*34; // 213.6
const pad   = n => String(n).padStart(2,'0');

function tick() {
  const r = Math.max(0, end - Date.now());
  const h = Math.floor(r/3600000);
  const m = Math.floor((r%3600000)/60000);
  const s = Math.floor((r%60000)/1000);

  const ring = document.getElementById('ringProgress');
  ring.style.strokeDashoffset = CIRC*(1 - r/TOTAL);
  ring.style.stroke = r < 600000 ? '#ff3333' : '#00cfff';

  const rt = document.getElementById('ringTime');
  rt.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  rt.classList.toggle('urgent', r < 600000);

  const sub = document.getElementById('cdSub');
  if (r <= 0) { sub.textContent='⚠️ Oferta expirada'; return; }
  if (r < 600000) { sub.textContent='🔴 ¡Menos de 10 min!'; sub.classList.add('hot'); }
  setTimeout(tick, 1000);
}
tick();
</script>
</body>
</html>
