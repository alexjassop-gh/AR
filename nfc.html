<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>YareCare · Medicamentos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --verde:      #2d6a4f;
    --verde-claro:#d4edda;
    --verde-mid:  #52b788;
    --rojo:       #e63946;
    --naranja:    #f4a261;
    --fondo:      #f0f4f0;
    --card:       #ffffff;
    --texto:      #1a1a2e;
    --suave:      #6b7280;
    --borde:      #e5e7eb;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--fondo);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 2rem;
    color: var(--texto);
  }

  /* ── Header ── */
  .header {
    width: 100%;
    max-width: 420px;
    text-align: center;
    margin-bottom: 1.2rem;
  }
  .header .logo {
    font-size: 2.2rem;
    margin-bottom: 0.2rem;
  }
  .header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--verde);
    letter-spacing: -0.3px;
  }
  .header .bloque-label {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--texto);
    margin-top: 0.6rem;
    letter-spacing: -0.5px;
  }
  .header .fecha {
    font-size: 0.82rem;
    color: var(--suave);
    margin-top: 0.2rem;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 1.1rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    margin-bottom: 0.9rem;
  }

  .card-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--suave);
    margin-bottom: 0.8rem;
  }

  /* ── Med rows ── */
  .med-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.75rem 0.85rem;
    border-radius: 10px;
    margin-bottom: 0.4rem;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    border: 2px solid transparent;
  }
  .med-row.activo {
    background: var(--verde-claro);
    border-color: var(--verde-mid);
  }
  .med-row.inactivo {
    background: #f9f9f9;
    opacity: 0.55;
  }
  .med-row .check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .med-row.activo .check  { background: var(--verde); color: white; }
  .med-row.inactivo .check { background: #e0e0e0; color: #aaa; }
  .med-row .med-info { flex: 1; }
  .med-row .med-nombre {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--texto);
    line-height: 1.2;
  }
  .med-row.inactivo .med-nombre { color: var(--suave); }
  .med-row .med-dosis {
    font-size: 0.75rem;
    color: var(--suave);
    margin-top: 0.1rem;
  }
  .med-row .critico-badge {
    font-size: 0.65rem;
    background: #fff0f0;
    color: var(--rojo);
    border: 1px solid #ffc9cc;
    padding: 0.15rem 0.4rem;
    border-radius: 20px;
    font-weight: 700;
    white-space: nowrap;
  }

  /* ── Hora ── */
  .hora-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 0;
  }
  .hora-label { font-size: 0.85rem; color: var(--suave); }
  .hora-display {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--verde);
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
    cursor: pointer;
    padding: 0.2rem 0.6rem;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .hora-display:hover { background: var(--verde-claro); }

  /* ── Time picker inline ── */
  .time-picker {
    display: none;
    background: #f4f9f6;
    border-radius: 10px;
    padding: 0.8rem;
    margin-top: 0.5rem;
    gap: 0.5rem;
    align-items: center;
    justify-content: center;
  }
  .time-picker.visible { display: flex; }
  .time-picker input[type="time"] {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--verde);
    border: 2px solid var(--verde-mid);
    border-radius: 8px;
    padding: 0.4rem 0.6rem;
    background: white;
    outline: none;
    width: 130px;
    text-align: center;
  }
  .time-picker button {
    padding: 0.5rem 0.9rem;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.9rem;
  }

  /* ── Nota ── */
  .nota-input {
    width: 100%;
    padding: 0.7rem 0.85rem;
    border: 1px solid var(--borde);
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--texto);
    background: white;
    outline: none;
    resize: none;
    transition: border-color 0.15s;
  }
  .nota-input:focus { border-color: var(--verde-mid); }

  /* ── Botón confirmar ── */
  .btn-confirmar {
    width: 100%;
    max-width: 420px;
    padding: 1rem;
    background: var(--verde);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 1.1rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: -0.2px;
    box-shadow: 0 4px 14px rgba(45,106,79,0.35);
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-confirmar:active { transform: scale(0.98); opacity: 0.9; }
  .btn-confirmar:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Pantalla éxito ── */
  #pantalla-exito {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem 1rem;
    width: 100%;
    max-width: 420px;
    animation: fadeIn 0.4s ease;
  }
  #pantalla-exito.visible { display: flex; }
  .exito-icon {
    font-size: 5rem;
    margin-bottom: 1rem;
    animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  .exito-hora {
    font-size: 3rem;
    font-weight: 900;
    color: var(--verde);
    letter-spacing: -2px;
    line-height: 1;
  }
  .exito-bloque {
    font-size: 1.1rem;
    color: var(--suave);
    margin-top: 0.3rem;
    margin-bottom: 1.2rem;
  }
  .exito-meds {
    background: var(--card);
    border-radius: 12px;
    padding: 0.9rem 1.1rem;
    width: 100%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    margin-bottom: 1.4rem;
    text-align: left;
  }
  .exito-med-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.35rem 0;
    font-size: 0.9rem;
    color: var(--texto);
    border-bottom: 1px solid var(--borde);
  }
  .exito-med-item:last-child { border-bottom: none; }
  .exito-med-item.omitido { color: var(--suave); text-decoration: line-through; }
  .btn-cerrar {
    padding: 0.7rem 2rem;
    background: var(--fondo);
    color: var(--verde);
    border: 2px solid var(--verde-mid);
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ── Error ── */
  #pantalla-error {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem 1rem;
    width: 100%;
    max-width: 420px;
  }
  #pantalla-error.visible { display: flex; }
  .error-icon { font-size: 4rem; margin-bottom: 1rem; }
  .error-msg { color: var(--rojo); font-weight: 600; margin-bottom: 0.5rem; }
  .error-detail { font-size: 0.82rem; color: var(--suave); margin-bottom: 1.2rem; }
  .btn-reintentar {
    padding: 0.7rem 1.5rem;
    background: var(--rojo);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.95rem;
  }

  /* ── Bloque no válido ── */
  #pantalla-invalida {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem 1rem;
    width: 100%;
    max-width: 420px;
  }
  #pantalla-invalida.visible { display: flex; }

  /* ── Spinner ── */
  .spinner {
    width: 22px; height: 22px;
    border: 3px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 0.5rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pop  { 0% { transform: scale(0.5); } 100% { transform: scale(1); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- ══ PANTALLA PRINCIPAL ══ -->
<div id="pantalla-principal">

  <div class="header">
    <div class="logo">🌿</div>
    <h1>YareCare</h1>
    <div class="bloque-label" id="bloque-label">—</div>
    <div class="fecha" id="fecha-label">—</div>
  </div>

  <!-- Meds -->
  <div class="card">
    <div class="card-title">Medicamentos del bloque</div>
    <div id="lista-meds"></div>
  </div>

  <!-- Hora -->
  <div class="card">
    <div class="card-title">Hora de toma</div>
    <div class="hora-row">
      <span class="hora-label">Registrar a las</span>
      <span class="hora-display" id="hora-display" onclick="toggleTimePicker()">00:00</span>
    </div>
    <div class="time-picker" id="time-picker">
      <input type="time" id="time-input" onchange="actualizarHora(this.value)">
      <button onclick="cerrarTimePicker()">OK</button>
    </div>
  </div>

  <!-- Nota opcional -->
  <div class="card">
    <div class="card-title">Nota (opcional)</div>
    <textarea class="nota-input" id="nota-input" rows="2"
      placeholder="Ej: tomó con poco jugo, estuvo difícil..."></textarea>
  </div>

  <button class="btn-confirmar" id="btn-confirmar" onclick="confirmar()">
    ✅ Confirmar toma
  </button>

</div>

<!-- ══ PANTALLA ÉXITO ══ -->
<div id="pantalla-exito">
  <div class="exito-icon">✅</div>
  <div class="exito-hora" id="exito-hora">—</div>
  <div class="exito-bloque" id="exito-bloque">—</div>
  <div class="exito-meds" id="exito-meds-lista"></div>
  <button class="btn-cerrar" onclick="window.close()">Cerrar</button>
</div>

<!-- ══ PANTALLA ERROR ══ -->
<div id="pantalla-error">
  <div class="error-icon">⚠️</div>
  <div class="error-msg" id="error-msg">No se pudo guardar</div>
  <div class="error-detail" id="error-detail">Revisa tu conexión e intenta de nuevo.</div>
  <button class="btn-reintentar" onclick="reintentar()">Reintentar</button>
</div>

<!-- ══ PANTALLA BLOQUE INVÁLIDO ══ -->
<div id="pantalla-invalida">
  <div style="font-size:3rem;margin-bottom:1rem">🏷️</div>
  <div style="font-weight:700;font-size:1.1rem;margin-bottom:0.5rem">Tag no reconocida</div>
  <div style="color:var(--suave);font-size:0.85rem">La URL no contiene un bloque válido.<br>Usa: ?bloque=manana, tarde, o noche</div>
</div>

<script type="module">
// ── Firebase SDK (módulos ESM desde CDN) ─────────────────────────────────────
import { initializeApp }                      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs }
                                               from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Config ───────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyCqS4CAY86uU_ORje8SascGJIuT1RsElc0",
  authDomain:        "yarecare-9a86b.firebaseapp.com",
  projectId:         "yarecare-9a86b",
  storageBucket:     "yarecare-9a86b.firebasestorage.app",
  messagingSenderId: "997226969746",
  appId:             "1:997226969746:web:e494c2576d74129444044b"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── Definición de bloques (espejo de Home.jsx) ────────────────────────────────
const BLOQUES = {
  manana: {
    label: "🌅 Mañana",
    meds: [
      { nombre: "Sertralina 50mg",     cantidad: 1,   dosis: "1 tableta" },
      { nombre: "Valproato 200mg",      cantidad: 0.5, dosis: "½ tableta" },
      { nombre: "Oxcarbazepina 300mg",  cantidad: 0.5, dosis: "½ tableta", critico: true },
      { nombre: "Metilfenidato",        cantidad: 1,   dosis: "1 tableta", nota: "Si no fue a escuela" },
    ]
  },
  tarde: {
    label: "🌤 Tarde",
    meds: [
      { nombre: "Hidroxicina",   cantidad: 0.25, dosis: "¼ tableta" },
      { nombre: "Metilfenidato", cantidad: 1,    dosis: "1 tableta" },
    ]
  },
  noche: {
    label: "🌙 Noche",
    meds: [
      { nombre: "Valproato 200mg",     cantidad: 0.5, dosis: "½ tableta" },
      { nombre: "Oxcarbazepina 300mg", cantidad: 1,   dosis: "1 tableta", critico: true },
      { nombre: "Hidroxicina",         cantidad: 0.5, dosis: "½ tableta" },
      { nombre: "Aripiprazol 7.5mg",   cantidad: 0.5, dosis: "½ tableta" },
    ]
  }
};

// ── Estado ───────────────────────────────────────────────────────────────────
let bloqueKey  = "";
let horaActual = "";
let medsActivos = {};   // { nombreMed: true/false }
let ultimoPayload = null;

// ── Utilidades de fecha/hora ─────────────────────────────────────────────────
function horaStr() {
  const now = new Date();
  return now.toTimeString().slice(0,5);
}

function fechaStr() {
  const now = new Date();
  return now.toISOString().slice(0,10);
}

function fechaLegible(str) {
  const [y,m,d] = str.split("-");
  const meses = ["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  const dias  = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const date  = new Date(str + "T12:00:00");
  return `${dias[date.getDay()]} ${d} de ${meses[m-1]} de ${y}`;
}

// ── Mostrar/ocultar pantallas ────────────────────────────────────────────────
function mostrar(id) {
  ["pantalla-principal","pantalla-exito","pantalla-error","pantalla-invalida"]
    .forEach(p => {
      const el = document.getElementById(p);
      el.style.display = "none";
      el.classList.remove("visible");
    });
  const target = document.getElementById(id);
  target.style.display = "flex";
  target.classList.add("visible");
}

// ── Inicializar página ────────────────────────────────────────────────────────
function init() {
  const params = new URLSearchParams(window.location.search);
  bloqueKey = params.get("bloque") || "";

  if (!BLOQUES[bloqueKey]) { mostrar("pantalla-invalida"); return; }

  const bloque = BLOQUES[bloqueKey];
  horaActual   = horaStr();
  const fecha  = fechaStr();

  // Header
  document.getElementById("bloque-label").textContent = bloque.label;
  document.getElementById("fecha-label").textContent  = fechaLegible(fecha);

  // Hora
  document.getElementById("hora-display").textContent = horaActual;
  document.getElementById("time-input").value         = horaActual;

  // Lista meds — todos activos por default
  const lista = document.getElementById("lista-meds");
  lista.innerHTML = "";
  bloque.meds.forEach(med => {
    medsActivos[med.nombre] = true;
    const row = document.createElement("div");
    row.className  = "med-row activo";
    row.id         = "med-" + med.nombre.replace(/\s/g,"_");
    row.innerHTML  = `
      <div class="check">✓</div>
      <div class="med-info">
        <div class="med-nombre">${med.nombre}</div>
        <div class="med-dosis">${med.dosis}${med.nota ? " · " + med.nota : ""}</div>
      </div>
      ${med.critico ? '<span class="critico-badge">⏱ 12h exactas</span>' : ""}
    `;
    row.onclick = () => toggleMed(med.nombre);
    lista.appendChild(row);
  });

  mostrar("pantalla-principal");
}

// ── Toggle med ────────────────────────────────────────────────────────────────
window.toggleMed = function(nombre) {
  medsActivos[nombre] = !medsActivos[nombre];
  const id  = "med-" + nombre.replace(/\s/g,"_");
  const row = document.getElementById(id);
  const chk = row.querySelector(".check");
  if (medsActivos[nombre]) {
    row.className = "med-row activo";
    chk.textContent = "✓";
  } else {
    row.className = "med-row inactivo";
    chk.textContent = "○";
  }
};

// ── Time picker ───────────────────────────────────────────────────────────────
window.toggleTimePicker = function() {
  const tp = document.getElementById("time-picker");
  tp.classList.toggle("visible");
};
window.cerrarTimePicker = function() {
  document.getElementById("time-picker").classList.remove("visible");
};
window.actualizarHora = function(val) {
  horaActual = val;
  document.getElementById("hora-display").textContent = val;
};

// ── Confirmar ─────────────────────────────────────────────────────────────────
window.confirmar = async function() {
  const btn = document.getElementById("btn-confirmar");
  btn.disabled   = true;
  btn.innerHTML  = '<span class="spinner"></span>Guardando…';

  const bloque  = BLOQUES[bloqueKey];
  const fecha   = fechaStr();
  const nota    = document.getElementById("nota-input").value.trim();

  const meds = bloque.meds.map(m => ({
    nombre:         m.nombre,
    tomado:         medsActivos[m.nombre] || false,
    cantidad:       m.cantidad,
    horaIndividual: null,
    sinComida:      false,
    autonomia:      false,
  }));

  const payload = {
    fecha,
    bloque:          bloqueKey,
    meds,
    horaReal:        horaActual,
    horasMedBloque:  {},
    horasIndividuales: null,
    incidencia:      false,
    incidenciaOpcion:"",
    incidenciaTexto: "",
    fuente:          "nfc",
    registradoPor:   "roxana-nfc",
    nota:            nota || null,
    creadoEn:        new Date().toISOString(),
  };

  ultimoPayload = payload;

  try {
    // Verificar si ya existe registro del bloque para hoy
    const q    = query(collection(db,"registros"), where("fecha","==",fecha), where("bloque","==",bloqueKey));
    const snap = await getDocs(q);
    if (!snap.empty) {
      // Ya existe — mostrar confirmación suave
      const existente = snap.docs[0].data();
      const fuenteExist = existente.fuente === "nfc" ? "otra tag NFC" : "la app YareCare";
      if (!confirm(`Este bloque ya fue registrado hoy a las ${existente.horaReal} desde ${fuenteExist}.\n¿Guardar de todas formas?`)) {
        btn.disabled  = false;
        btn.innerHTML = "✅ Confirmar toma";
        return;
      }
    }

    await addDoc(collection(db,"registros"), payload);
    mostrarExito(bloque.label, fecha);

  } catch(e) {
    console.error(e);
    document.getElementById("error-msg").textContent    = "No se pudo guardar";
    document.getElementById("error-detail").textContent = e.message || "Revisa tu conexión e intenta de nuevo.";
    mostrar("pantalla-error");
    btn.disabled  = false;
    btn.innerHTML = "✅ Confirmar toma";
  }
};

// ── Pantalla éxito ────────────────────────────────────────────────────────────
function mostrarExito(bloqueLabel, fecha) {
  document.getElementById("exito-hora").textContent   = horaActual;
  document.getElementById("exito-bloque").textContent = `${bloqueLabel} · ${fechaLegible(fecha)}`;

  const lista = document.getElementById("exito-meds-lista");
  lista.innerHTML = "";
  BLOQUES[bloqueKey].meds.forEach(m => {
    const div = document.createElement("div");
    div.className = "exito-med-item" + (medsActivos[m.nombre] ? "" : " omitido");
    div.innerHTML = `<span>${medsActivos[m.nombre] ? "✅" : "❌"}</span><span>${m.nombre}</span>`;
    lista.appendChild(div);
  });

  mostrar("pantalla-exito");
}

// ── Reintentar ────────────────────────────────────────────────────────────────
window.reintentar = async function() {
  if (!ultimoPayload) { init(); return; }
  mostrar("pantalla-principal");
  await window.confirmar();
};

// ── Arrancar ──────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
