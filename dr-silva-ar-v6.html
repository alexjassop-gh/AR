<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Dr. Alejandro Silva</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; background:#000; font-family:'Inter',Arial,sans-serif; }

/* cámara de fondo */
#camBg {
  position: fixed; inset: 0;
  width:100%; height:100%;
  object-fit: cover;
  z-index: 0;
}

/* canvas donde se renderiza el holograma sin fondo negro */
#holoCanvas {
  position: fixed;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  max-width: 400px;
  z-index: 2;
  pointer-events: none;
}

/* video oculto para leer frames */
#vid-holo, #vid-unfold {
  position: fixed;
  left: -9999px;
  width: 400px;
  visibility: hidden;
}

/* iconos */
.icon-row {
  position: fixed;
  left: 0; right: 0;
  display: flex;
  justify-content: space-around;
  padding: 0 40px;
  z-index: 5;
}
.icon-btn {
  display: flex; flex-direction: column;
  align-items: center; text-decoration: none; cursor: pointer;
}
.icon-circle {
  width: 50px; height: 50px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  background: rgba(0,0,0,0.35);
  border: 1.5px solid rgba(255,255,255,0.5);
  backdrop-filter: blur(4px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: transform 0.15s;
}
.icon-btn:active .icon-circle { transform: scale(0.9); }

/* panel countdown */
.panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px 20px 16px;
}

.ring-wrap {
  position: relative;
  width: 90px; height: 90px;
  display: flex; align-items: center; justify-content: center;
}
.ring-wrap svg {
  position: absolute; inset: 0;
  transform: rotate(-90deg);
}
.ring-bg { fill:none; stroke:rgba(255,255,255,0.15); stroke-width:4; }
.ring-progress {
  fill: none; stroke: #00cfff; stroke-width: 4;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s linear;
}
.ring-inner {
  z-index:1; text-align:center; line-height:1.2;
}
.ring-time {
  font-size: 14px; font-weight: 800; color: #fff;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 0 8px rgba(0,0,0,1), 0 1px 3px #000;
  -webkit-text-stroke: 0.5px rgba(0,0,0,0.8);
}
.ring-time.urgent { color:#ff3333; animation: blink .8s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }
.ring-label {
  font-size: 8px; font-weight: 700; color: rgba(255,255,255,0.7);
  letter-spacing: 1px; text-transform: uppercase;
  text-shadow: 0 1px 3px #000;
}

.cd-sub {
  font-size: 11px; color: #fff; font-weight: 600;
  text-align: center;
  text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.8);
}
.cd-sub.hot { color: #ff8844; }
</style>
</head>
<body>

<video id="camBg" autoplay playsinline muted></video>

<!-- videos ocultos fuera de pantalla -->
<video id="vid-holo"
  src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/1%20label%20girando.mp4"
  autoplay loop muted playsinline preload="auto" crossorigin="anonymous">
</video>
<video id="vid-unfold"
  src="https://raw.githubusercontent.com/alexjassop-gh/AR/main/2%20label%20unfolds%20fondo%20negro.mp4"
  muted playsinline preload="auto" crossorigin="anonymous">
</video>

<!-- canvas visible -->
<canvas id="holoCanvas"></canvas>

<!-- iconos -->
<div class="icon-row" id="iconRow">
  <a class="icon-btn" href="https://wa.me/528712345528?text=Hola%20Dr.%20Silva,%20vi%20su%20promoción%20de%20consulta%20gratis">
    <div class="icon-circle">📞</div>
  </a>
  <a class="icon-btn" href="https://calendly.com" target="_blank">
    <div class="icon-circle">📅</div>
  </a>
  <a class="icon-btn" href="https://maps.google.com/?q=Torreón,Coahuila,Mexico" target="_blank">
    <div class="icon-circle">📍</div>
  </a>
</div>

<!-- countdown -->
<div class="panel">
  <div class="ring-wrap">
    <svg viewBox="0 0 90 90" width="90" height="90">
      <circle class="ring-bg" cx="45" cy="45" r="40"/>
      <circle class="ring-progress" id="ringProgress" cx="45" cy="45" r="40"
        stroke-dasharray="251.3" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-inner">
      <div class="ring-time" id="ringTime">02:00:00</div>
      <div class="ring-label">⏰ oferta</div>
    </div>
  </div>
  <div class="cd-sub" id="cdSub">¡Agenda antes de que expire!</div>
</div>

<script>
// ── CÁMARA ──
navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false })
  .then(s => document.getElementById('camBg').srcObject = s)
  .catch(() => {});

// ── CANVAS KEYING: elimina negro por luminosidad ──
const canvas  = document.getElementById('holoCanvas');
const ctx     = canvas.getContext('2d');
const vh      = document.getElementById('vid-holo');
const vu      = document.getElementById('vid-unfold');
let activeVid = vh;
let done      = false;
let W = 400, H = 225;

canvas.width  = W;
canvas.height = H;

// posicionar canvas y iconos dinámicamente
function layout() {
  const vw = window.innerWidth;
  const cw = Math.min(vw * 0.92, 400);
  const ch = cw * (9/16);
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  // bottom: encima del panel (panel ~120px)
  const bottom = 130;
  canvas.style.bottom = bottom + 'px';
  // iconos justo debajo del canvas
  document.getElementById('iconRow').style.bottom = (bottom - 58) + 'px';
}
layout();
window.addEventListener('resize', layout);

function renderFrame() {
  requestAnimationFrame(renderFrame);
  if (!activeVid || activeVid.readyState < 2) return;

  // dibujar frame del video en canvas offscreen
  const tmp = document.createElement('canvas');
  tmp.width = W; tmp.height = H;
  const tc  = tmp.getContext('2d');
  tc.drawImage(activeVid, 0, 0, W, H);

  const imgData = tc.getImageData(0, 0, W, H);
  const d = imgData.data;

  // keying: píxeles oscuros → transparentes
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    // luminosidad percibida
    const lum = 0.299*r + 0.587*g + 0.114*b;
    if (lum < 30) {
      d[i+3] = 0; // totalmente transparente
    } else if (lum < 60) {
      d[i+3] = Math.round((lum - 30) / 30 * 255); // fade suave
    }
    // píxeles brillantes quedan opacos
  }

  ctx.clearRect(0, 0, W, H);
  ctx.putImageData(imgData, 0, 0);
}
renderFrame();

// transición después de 6s
function transition() {
  if (done) return; done = true;
  activeVid = vu;
  vu.currentTime = 0;
  vu.play();
}
vh.addEventListener('canplay', () => setTimeout(transition, 6000), { once:true });
setTimeout(transition, 7500);

// ── COUNTDOWN ──
const TOTAL = 2*60*60*1000;
const end   = Date.now() + TOTAL;
const CIRC  = 2 * Math.PI * 40; // 251.3
const pad   = n => String(n).padStart(2,'0');

function tick() {
  const r = Math.max(0, end - Date.now());
  const h = Math.floor(r/3600000);
  const m = Math.floor((r%3600000)/60000);
  const s = Math.floor((r%60000)/1000);

  const pct = r / TOTAL;
  const ring = document.getElementById('ringProgress');
  ring.style.strokeDashoffset = CIRC * (1 - pct);
  ring.style.stroke = r < 600000 ? '#ff3333' : '#00cfff';

  const rt = document.getElementById('ringTime');
  rt.textContent = `${pad(h)}:${pad(m)}:${pad(s)}`;
  rt.classList.toggle('urgent', r < 600000);

  const sub = document.getElementById('cdSub');
  if (r <= 0) { sub.textContent = '⚠️ Oferta expirada'; return; }
  if (r < 600000) { sub.textContent = '🔴 ¡Menos de 10 min!'; sub.classList.add('hot'); }
  setTimeout(tick, 1000);
}
tick();
</script>
</body>
</html>
